plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "db/queue_schema.rb"
    - "vendor/**/*"
    - "config/**/*"
    - "spec/rails_helper.rb"

# 1ファイル200行以内（プロジェクト規約）
Metrics/ClassLength:
  Max: 150

Metrics/MethodLength:
  Max: 20

# 日本語コメントを許可
Style/AsciiComments:
  Enabled: false

# APIモードのモジュールネスト
Style/ClassAndModuleChildren:
  Enabled: false

# Ruby 3.x ではフリーズコメント不要
Style/FrozenStringLiteralComment:
  Enabled: false

# ドキュメントコメントは強制しない
Style/Documentation:
  Enabled: false

# Windowsの改行コード（CRLF）を許可
Layout/EndOfLine:
  Enabled: false

Rails:
  Enabled: true

# テストでは関連する複数のexpectをまとめて書くことを許可
RSpec/MultipleExpectations:
  Max: 4

# AniListAdapter等のアクロニムを含むクラスのファイル名はZeitwerkの命名規則（AniList→anilist）に合わせているため
# active_supportインフレクターを使用してinflections.rbのアクロニム設定を参照させる
RSpec/SpecFilePathFormat:
  EnforcedInflector: active_support
  InflectorPath: "./config/initializers/inflections.rb"

# 日本語のcontext記述を許可（「正常系」「異常系」等）
RSpec/ContextWording:
  Enabled: false

# テストの行数制限を緩和
RSpec/ExampleLength:
  Max: 10

# let!のセットアップを許可（テストのDB状態構築に使用）
RSpec/LetSetup:
  Enabled: false
