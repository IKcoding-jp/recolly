pre-commit:
  parallel: true
  commands:
    rubocop:
      root: backend/
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
    eslint:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: npx eslint {staged_files}
    prettier:
      root: frontend/
      glob: "*.{ts,tsx,css,json}"
      run: npx prettier --check {staged_files}

pre-push:
  commands:
    rspec:
      run: cd backend && bundle exec rspec
    vitest:
      run: cd frontend && npm test
